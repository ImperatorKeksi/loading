<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Squadron - Loading...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="background"></div>
    <div id="overlay"></div>

    <div class="container">

        <!-- TOP LEFT: Header -->
        <div class="header">
            <div class="subtitle pulse">Galactic Republic</div>
            <h1>SHADOW SQUADRON</h1>
        </div>

        <!-- TOP RIGHT: Server Info -->
        <div class="server-info">
            <div class="info-item">
                <div class="info-label">Server</div>
                <div class="info-value" id="server-name">Star Wars Epics</div>
            </div>
            <div class="info-item">
                <div class="info-label">Map</div>
                <div class="info-value" id="map-name">Connecting...</div>
            </div>
            <div class="info-item">
                <div class="info-label">Gamemode</div>
                <div class="info-value" id="gamemode">Star Wars RP</div>
            </div>
        </div>

        <!-- CENTER PANEL: Changelog -->
        <div class="changelog-card">
            <div class="changelog-header">
                <span class="changelog-icon">◈</span>
                SERVER CHANGELOG
                <span class="changelog-version" id="cl-version">v3.0</span>
                <span class="cl-live-dot" title="Live-Daten von GitHub"></span>
            </div>
            <div class="changelog-entries" id="changelog-entries">
                <!-- Skeleton loader -->
                <div class="cl-skeleton"></div>
                <div class="cl-skeleton"></div>
                <div class="cl-skeleton"></div>
                <div class="cl-skeleton"></div>
            </div>
            <div class="changelog-footer">
                <div class="scan-bar"></div>
                <span class="pulse">TRANSMISSION ENCRYPTED // REPUBLIC INTEL NET // <span id="cl-last-updated">LOADING...</span></span>
            </div>
        </div>

        <!-- BOTTOM: Loading Bar -->
        <div class="loading-section">
            <div class="status-text">
                <span id="status">Connecting to server...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="file-indicator">
                <span id="current-file">Verbindung wird hergestellt...</span>
                <span id="files-needed">Resources: 0/0</span>
            </div>
        </div>

    </div>

    <!-- Music Player -->
    <div class="music-player" id="music-player">
        <div class="mp-visualizer" id="mp-visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="mp-info">
            <span class="mp-icon">♪</span>
            <span class="mp-title">Venator Alarmfrequenz</span>
        </div>
        <div class="mp-controls">
            <button class="mp-btn" id="mp-mute" title="Stummschalten">
                <svg id="icon-sound" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                </svg>
                <svg id="icon-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <line x1="23" y1="9" x2="17" y2="15"/>
                    <line x1="17" y1="9" x2="23" y2="15"/>
                </svg>
            </button>
            <div class="mp-volume-wrap">
                <input type="range" id="mp-volume" class="mp-slider" min="0" max="100" value="10" title="Lautstärke">
                <div class="mp-volume-fill" id="mp-volume-fill" style="width:10%"></div>
            </div>
            <span class="mp-vol-label" id="mp-vol-label">10%</span>
        </div>
    </div>

    <audio id="loading-audio" loop autoplay>
        <source src="Venator Alarmfrequenz.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
